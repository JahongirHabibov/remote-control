# ─────────────────────────────────────────────────────────────────────────────
# fail2ban filter — detect Guacamole authentication failures via nginx logs
# Detects HTTP 403 responses to the Guacamole /api/tokens endpoint
# Copy to /etc/fail2ban/filter.d/guacamole.conf
# ─────────────────────────────────────────────────────────────────────────────

[Definition]
# Match: POST /guacamole/api/tokens → 403 (wrong password) or 429 (rate limit)
failregex = ^<HOST> .* "POST /guacamole/api/tokens HTTP/[0-9.]+" (403|429) .*$

ignoreregex =

# Hint: test this filter with:
#   fail2ban-regex /var/log/nginx/access.log /etc/fail2ban/filter.d/guacamole.conf
