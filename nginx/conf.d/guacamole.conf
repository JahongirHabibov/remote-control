# ─────────────────────────────────────────────────────────────────────────────
# nginx — Guacamole reverse proxy for remote.legisell.de
# Generated/managed by setup.sh — edit the template, not this file directly
# ─────────────────────────────────────────────────────────────────────────────

# Upstream definition
upstream guacamole_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN_PLACEHOLDER;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main server block
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name DOMAIN_PLACEHOLDER;

    # ── TLS ───────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;
    include             /etc/nginx/snippets/ssl-params.conf;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"     always;
    # CSP: allow Guacamole's inline styles/scripts + WebSocket to same origin
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss://$host; font-src 'self' data:; frame-ancestors 'self';" always;

    # ── Rate limiting (defined in security.conf) ──────────────────────────────
    limit_conn conn_limit_per_ip 30;
    limit_req  zone=general burst=50 nodelay;

    # ── Root redirect to Guacamole ────────────────────────────────────────────
    location = / {
        return 301 /guacamole/;
    }

    # ── Guacamole — standard HTTP traffic ─────────────────────────────────────
    location /guacamole/ {
        proxy_pass         http://guacamole_backend/guacamole/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_buffering    off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Cookies: rewrite path from /guacamole/ to /guacamole/
        proxy_cookie_path /guacamole/ /guacamole/;
    }

    # ── Guacamole — WebSocket tunnel (VNC/SSH sessions) ──────────────────────
    location /guacamole/websocket-tunnel {
        proxy_pass         http://guacamole_backend/guacamole/websocket-tunnel;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_buffering    off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Guacamole login endpoint — stricter rate limiting ────────────────────
    location /guacamole/api/tokens {
        limit_req zone=login burst=5 nodelay;

        proxy_pass         http://guacamole_backend/guacamole/api/tokens;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
    }

    # ── Block common attack paths ─────────────────────────────────────────────
    location ~* \.(php|asp|aspx|jsp|cgi|sh|py|pl|rb)$ {
        return 404;
    }

    location ~* /(wp-admin|wp-login|xmlrpc|phpmyadmin|pma|admin|login\.php) {
        return 404;
    }

    # ── Deny hidden files ─────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
}
