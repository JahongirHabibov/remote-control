# ─────────────────────────────────────────────────────────────────────────────
# nginx — global security & rate limiting zones
# Include in nginx.conf: include /etc/nginx/conf.d/security.conf;
# ─────────────────────────────────────────────────────────────────────────────

# ── Rate limiting zones ───────────────────────────────────────────────────────

# General traffic: 20 requests/second per IP
limit_req_zone  $binary_remote_addr  zone=general:20m   rate=20r/s;

# Login endpoint: 5 attempts/minute per IP (aggressive brute-force protection)
limit_req_zone  $binary_remote_addr  zone=login:10m     rate=5r/m;

# Concurrent connections per IP
limit_conn_zone $binary_remote_addr  zone=conn_limit_per_ip:10m;

# ── Rate limit response ───────────────────────────────────────────────────────
limit_req_status  429;
limit_conn_status 429;

# ── WebSocket upgrade map (used in guacamole.conf proxy) ────────────────────
map $http_upgrade $connection_upgrade {
    default  upgrade;
    ''       close;
}

# ── Timeouts ──────────────────────────────────────────────────────────────────
client_body_timeout    12s;
client_header_timeout  12s;
keepalive_timeout      15s;
send_timeout           10s;

# ── Request size limits ───────────────────────────────────────────────────────
client_max_body_size   10m;
client_body_buffer_size 128k;

# ── Hide nginx version ────────────────────────────────────────────────────────
server_tokens off;

# ── Logging format with client IP ─────────────────────────────────────────────
log_format security '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

# ── Geo-based blocking (optional — uncomment and add IPs to blocklist) ────────
# geo $blocked_ip {
#     default         0;
#     1.2.3.4/32      1;   # Example: block specific IP
#     5.6.7.0/24      1;   # Example: block IP range
# }
# map $blocked_ip $deny_access {
#     1  1;
#     0  $limit_req_status;
# }
