services:

  # ── nginx reverse proxy (TLS termination + security headers) ─────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: pos-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/certs:/etc/letsencrypt:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - guacamole
    networks:
      - guac-net

  # ── Certbot — Let's Encrypt cert renewal daemon ───────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: pos-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/certs:/etc/letsencrypt
    # Renew every 12h; nginx reload is handled by make certbot-renew cron target
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

  # ── fail2ban — brute-force + DoS protection ───────────────────────────────────
  fail2ban:
    image: crazymax/fail2ban:latest
    container_name: pos-fail2ban
    restart: unless-stopped
    network_mode: host        # must share host network stack to manipulate iptables
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - TZ=${TZ:-UTC}
      - F2B_LOG_LEVEL=INFO
      - F2B_DB_PURGEAGE=7d
    volumes:
      - ./fail2ban/jail.d:/data/jail.d:ro
      - ./fail2ban/filter.d:/data/filter.d:ro
      - nginx-logs:/var/log/nginx:ro
      - fail2ban-data:/data

  # ── Apache Guacamole web application ─────────────────────────────────────────
  guacamole:
    image: guacamole/guacamole:${GUACAMOLE_VERSION:-1.5.5}
    container_name: pos-guacamole
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      guacd:
        condition: service_started
    environment:
      GUACD_HOSTNAME: guacd
      GUACD_PORT: 4822
      POSTGRESQL_HOSTNAME: postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_DATABASE: ${POSTGRES_DB:-guacamole_db}
      POSTGRESQL_USERNAME: ${POSTGRES_USER:-guacamole}
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./guacamole/extensions:/etc/guacamole/extensions:ro
      - ./guacamole/guacamole.properties:/etc/guacamole/guacamole.properties:ro
    # NOT exposed to host — nginx proxies to this container only
    expose:
      - "8080"
    networks:
      - guac-net

  # ── Guacamole protocol daemon ─────────────────────────────────────────────────
  guacd:
    image: guacamole/guacd:${GUACAMOLE_VERSION:-1.5.5}
    container_name: pos-guacd
    restart: unless-stopped
    networks:
      - guac-net

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-guacamole_db}
      POSTGRES_USER: ${POSTGRES_USER:-guacamole}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./guacamole/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-guacamole} -d ${POSTGRES_DB:-guacamole_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - guac-net

networks:
  guac-net:
    driver: bridge

volumes:
  postgres-data:
  nginx-logs:
  fail2ban-data:
